name: Update paper README and gadget.md

on:
  push:
    branches: [main, master]
    paths:
      - 'paper'
      - 'paper_backup/**'
      - 'scripts/update_paper_readme.R'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install rmarkdown (for pandoc)
        run: Rscript -e 'install.packages("rmarkdown", repos = "https://cloud.r-project.org")'

      - name: Run update-readme
        run: make update-readme

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync paper_backup from paper/ tex'
          file_pattern: paper_backup/README.md paper_backup/gadget.md
